services:
  - type: web
    name: airconnect-backend
    runtime: docker
    repo: https://github.com/Shubhs1123/AIRConnect
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: airconnect-db
          property: connectionString
      - key: REDIS_URL
        value: ""
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: MQTT_BROKER_URL
        sync: false
      - key: MQTT_ADMIN_USER
        sync: false
      - key: MQTT_ADMIN_PASS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STORAGE_PATH
        value: "/data/storage"
      - key: BUILD_CONCURRENCY
        value: "1"
    disk:
      name: airconnect-storage
      mountPath: /data/storage
      sizeGB: 1
    healthCheckPath: /health

databases:
  - name: airconnect-db
    plan: free
    databaseName: airconnect_db
    user: airconnect_db_user
