# AIRConnect MQTT Broker Configuration

# TLS-encrypted MQTT (primary)
listener 8883
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
require_certificate false

# Plain MQTT (for backend + dev — switch to TLS-only in production)
listener 1883

# WebSocket (for web clients if needed)
listener 9001
protocol websockets

# Authentication (use password_file in production)
allow_anonymous true

# Access control
acl_file /mosquitto/config/acls.conf

# Persistence
persistence true
persistence_location /mosquitto/data/
